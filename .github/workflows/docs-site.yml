# Optional MkDocs check when mkdocs.yml exists (documentation-generator).
name: docs-site

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "docs/documentation-generator/**"
      - "docs/*.md"
      - "docs/adr/**"
      - "milestones/**"
      - "README.md"
      - "dwave.md"
      - ".github/workflows/docs-site.yml"
  push:
    branches: [main]
    paths:
      - "docs/documentation-generator/**"
      - "docs/*.md"
      - "docs/adr/**"
      - "milestones/**"
      - "README.md"
      - "dwave.md"
      - ".github/workflows/docs-site.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/documentation-generator
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/documentation-generator/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: MkDocs build (strict, if configured)
        run: |
          if [[ -f mkdocs.yml ]]; then
            mkdocs build --strict
          else
            echo "::notice::No mkdocs.yml — skipping MkDocs. Video bundle & docs live under datadog-drilldown-video-docs/."
          fi
