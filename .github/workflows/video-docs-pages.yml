# Publish pre-built MP4s from recordings/ to GitHub Pages (no TTS or compose in CI).
#
# Produce videos locally: cd datadog-drilldown-video-docs && ./compose.sh
# Then commit docs/.../recordings/*.mp4 (and full-demo.mp4) and push.
#
# Setup: Settings → Pages → Source: GitHub Actions
#
name: video-docs-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/documentation-generator/datadog-drilldown-video-docs/recordings/**"
      - "docs/documentation-generator/datadog-drilldown-video-docs/pages-site/**"
      - ".github/workflows/video-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages-video-docs"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble Pages site from recordings/
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        run: |
          set -euo pipefail
          shopt -s nullglob
          mp4s=(recordings/*.mp4)
          if [[ ${#mp4s[@]} -eq 0 ]]; then
            echo "::error::No recordings/*.mp4 found. Run ./compose.sh locally, then commit recordings/ (see bundle README)."
            exit 1
          fi
          SITE="${GITHUB_WORKSPACE}/_video_pages_site"
          mkdir -p "$SITE/videos"
          cp pages-site/index.html "$SITE/index.html"
          touch "$SITE/.nojekyll"
          cp recordings/*.mp4 "$SITE/videos/"
          echo "Published:"
          ls -la "$SITE/videos"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _video_pages_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
