# Build narrated MP4s (OpenAI TTS + ffmpeg text visuals) and deploy static site to GitHub Pages.
#
# Setup (once per repo):
#   1. Settings → Secrets and variables → Actions → New repository secret: OPENAI_API_KEY
#   2. Settings → Pages → Build and deployment → Source: GitHub Actions
#
name: video-docs-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/documentation-generator/datadog-drilldown-video-docs/**"
      - ".github/workflows/video-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages-video-docs"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/documentation-generator/datadog-drilldown-video-docs/requirements.txt

      - name: Install Python dependencies
        run: pip install -r docs/documentation-generator/datadog-drilldown-video-docs/requirements.txt

      - name: Generate TTS audio
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::Repository secret OPENAI_API_KEY is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          python generate-narration.py

      - name: Compose segment videos
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        run: bash ./compose.sh

      - name: Assemble Pages site
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        run: |
          SITE="${GITHUB_WORKSPACE}/_video_pages_site"
          mkdir -p "$SITE/videos"
          cp pages-site/index.html "$SITE/index.html"
          touch "$SITE/.nojekyll"
          cp recordings/*.mp4 "$SITE/videos/"
          ls -la "$SITE/videos"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _video_pages_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
