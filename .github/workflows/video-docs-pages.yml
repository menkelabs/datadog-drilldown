# Build MP4s (OpenAI TTS when secret is set, else silent stub audio) + ffmpeg text visuals → GitHub Pages.
#
# Setup (once per repo):
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Optional: Settings → Secrets → Actions → OPENAI_API_KEY for real narration on Pages.
#      Without it, CI still passes: stub MP3s match ~script length (silent audio).
#
name: video-docs-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/documentation-generator/datadog-drilldown-video-docs/**"
      - ".github/workflows/video-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages-video-docs"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/documentation-generator/datadog-drilldown-video-docs/requirements.txt

      - name: Install Python dependencies
        run: pip install -r docs/documentation-generator/datadog-drilldown-video-docs/requirements.txt

      - name: Generate TTS audio (OpenAI)
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate-narration.py

      - name: Stub narration audio (no OPENAI_API_KEY)
        if: ${{ secrets.OPENAI_API_KEY == '' }}
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        run: |
          echo "::warning::OPENAI_API_KEY not set — publishing silent audio with duration estimated from narration word count. Add the repo secret for real TTS."
          mkdir -p audio
          shopt -s nullglob
          for f in narration/[0-9][0-9]-*.md; do
            stem=$(basename "$f" .md)
            words=$(tr -cs '[:alnum:]_' ' ' < "$f" | wc -w)
            secs=$(awk -v w="$words" 'BEGIN { s=int(w/2.2)+10; if(s<15)s=15; if(s>300)s=300; print s }')
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=stereo -t "$secs" -c:a libmp3lame -q:a 5 "audio/${stem}.mp3"
          done
          ls -la audio/

      - name: Compose segment videos
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        run: bash ./compose.sh

      - name: Assemble Pages site
        working-directory: docs/documentation-generator/datadog-drilldown-video-docs
        run: |
          SITE="${GITHUB_WORKSPACE}/_video_pages_site"
          mkdir -p "$SITE/videos"
          cp pages-site/index.html "$SITE/index.html"
          touch "$SITE/.nojekyll"
          cp recordings/*.mp4 "$SITE/videos/"
          ls -la "$SITE/videos"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _video_pages_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
