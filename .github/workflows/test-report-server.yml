name: test-report-server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "test-report-server/**"
      - ".github/workflows/test-report-server.yml"
  push:
    branches: [main]
    paths:
      - "test-report-server/**"
      - ".github/workflows/test-report-server.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Maven test
        run: mvn -q test
        working-directory: test-report-server

  e2e-ui:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: test-report-server/e2e/package-lock.json

      - name: Install Playwright + npm deps
        working-directory: test-report-server/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright UI tests
        working-directory: test-report-server/e2e
        env:
          CI: "1"
        run: npm test
