# M1a: local-only pytest for dice-leap-poc (no Leap / dwave-system in CI).
name: dice-leap-poc

on:
  pull_request:
    paths:
      - "dice-leap-poc/**"
      - ".github/workflows/dice-leap-poc.yml"
  push:
    branches: [main]
    paths:
      - "dice-leap-poc/**"
      - ".github/workflows/dice-leap-poc.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dice-leap-poc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: dice-leap-poc/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: pytest tests/ -q
