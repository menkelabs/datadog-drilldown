spring:
  application:
    name: embabel-dice-rca-test
  main:
    banner-mode: off

# Disable real Datadog in tests; use MockDatadogClient + TestScenarios (see DatadogConfig)
datadog:
  api-key: ""
  app-key: ""
  site: datadoghq.com
  mock:
    active-scenario: database-latency

# Embabel configuration for tests
embabel:
  api-key: ""
  model: gpt-4-mock
  temperature: 0.0
  rca:
    qubo:
      enabled: false

# Dice configuration for tests
dice:
  ingestion:
    enabled: true
    batch-size: 10
  analysis:
    auto-trigger: true

# Logging - quieter for tests
logging:
  level:
    root: WARN
    com.example.rca: INFO
